apiVersion: v1
kind: ConfigMap
metadata:
  name: tech-support-agent-config
  labels:
    app: tech-support-agent
data:
  PG_HOST: postgres
  PG_PORT: "5432"
  PG_DATABASE: tech_support_agent
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  OPSMIND_ASYNC_ENABLED: "false"
  LLM_MODEL: qwen-plus
  LLM_READ_TIMEOUT_SEC: "60"
  KNOWLEDGE_SEARCH_TIMEOUT_MS: "5000"

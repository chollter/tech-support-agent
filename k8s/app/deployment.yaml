apiVersion: apps/v1
kind: Deployment
metadata:
  name: tech-support-agent
  labels:
    app: tech-support-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tech-support-agent
  template:
    metadata:
      labels:
        app: tech-support-agent
    spec:
      containers:
        - name: app
          image: ghcr.io/chollter/tech-support-agent:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8020
          envFrom:
            - configMapRef:
                name: tech-support-agent-config
            - secretRef:
                name: tech-support-agent-secret
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8020
            initialDelaySeconds: 60
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8020
            initialDelaySeconds: 90
            periodSeconds: 20

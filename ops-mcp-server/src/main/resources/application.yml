spring:
  application:
    name: ops-mcp-server
  main:
    # STDIO MCP server 不需要 web，禁用省资源
    web-application-type: none
    # 关闭 banner：banner 由 SpringApplication 直接打到 stdout，会污染 MCP JSON-RPC 通道。
    # （logback 控制不了 banner，必须在这里关；日志本身的 stdout→stderr 重定向见 logback-spring.xml）
    banner-mode: off
  datasource:
    # 连同一个 PostgreSQL（与主应用共享样例数据）
    url: jdbc:postgresql://${PG_HOST:localhost}:${PG_PORT:5432}/${PG_DATABASE:tech_support_agent}
    username: ${PG_USER:postgres}
    password: ${PG_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  ai:
    mcp:
      server:
        name: ops-mcp-server
        version: 1.0.0
        type: SYNC

mybatis-plus:
  global-config:
    banner: false
    db-config:
      id-type: assign_uuid
  configuration:
    map-underscore-to-camel-case: true

logging:
  # STDOUT 是 MCP JSON-RPC 通信通道，禁止任何日志写 stdout。
  # 实际输出流的重定向（ConsoleAppender target=System.err）见 logback-spring.xml，
  # 这里只保留格式（logback 配置加载后该 pattern 仍生效）。
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level %logger{36} - %msg%n"

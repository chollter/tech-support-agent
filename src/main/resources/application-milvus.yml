# Milvus 向量 RAG 模式：mvn spring-boot:run -Dspring-boot.run.profiles=milvus
# 业务数据和知识库正文仍在 PostgreSQL；Milvus 只保存 knowledge_document 的向量索引。

spring:
  ai:
    vectorstore:
      milvus:
        client:
          host: ${MILVUS_HOST:localhost}
          port: ${MILVUS_PORT:19530}
          username: ${MILVUS_USERNAME:}
          password: ${MILVUS_PASSWORD:}
          token: ${MILVUS_TOKEN:}
          secure: ${MILVUS_SECURE:false}
        database-name: ${MILVUS_DATABASE:default}
        collection-name: ${MILVUS_COLLECTION:knowledge_chunk_vectors}
        embedding-dimension: ${MILVUS_EMBEDDING_DIMENSION:1536}
        initialize-schema: ${MILVUS_INITIALIZE_SCHEMA:true}

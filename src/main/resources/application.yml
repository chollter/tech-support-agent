spring:
  application:
    name: tech-support-agent
  profiles:
    default: local
  autoconfigure:
    exclude:
      - org.springframework.ai.autoconfigure.vectorstore.pgvector.PgVectorStoreAutoConfiguration
      - org.springframework.ai.autoconfigure.vectorstore.milvus.MilvusVectorStoreAutoConfiguration
  datasource:
    url: jdbc:postgresql://${PG_HOST:localhost}:${PG_PORT:5432}/${PG_DATABASE:tech_support_agent}
    username: ${PG_USER:postgres}
    password: ${PG_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/data-knowledge.sql
  ai:
    dashscope:
      api-key: ${LLM_API_KEY:}
      # HTTP 层读响应超时（秒）——治线程泄漏之本。
      # DashScopeAutoConfiguration 的 restClientCustomizer 消费本字段设置 socket readTimeout，
      # 保证单次 LLM 调用最坏 60s 释放线程（Resilience4j TimeLimiter 的 cancel 对阻塞 IO 无效，
      # HTTP 层 timeout 是最终保证）。等于业务层 llm-default TimeLimiter 上限。
      read-timeout: ${LLM_READ_TIMEOUT_SEC:60}
      chat:
        options:
          model: ${LLM_MODEL:qwen-plus}
    mcp:
      client:
        # 默认关闭：测试/无 PG 环境下不拉起 server 子进程；生产/演示时设 MCP_ENABLED=true
        enabled: ${MCP_ENABLED:true}
        name: tech-support-mcp-client
        version: 1.0.0
        type: SYNC
        stdio:
          connections:
            ops-mcp-server:
              # stdio 子进程：应用拉起 ops-mcp-server jar，经 stdin/stdout 通信
              # 注意：默认路径相对于「主应用运行目录」（仓库根），ops-mcp-server 是仓库内的独立模块
              # （根 pom 不含 <modules>，根目录 mvn package 不会自动打包它，需单独构建，见 README）
              command: ${MCP_SERVER_JAVA:java}
              args:
                - "-jar"
                - ${MCP_SERVER_JAR:ops-mcp-server/target/ops-mcp-server-1.0.0-SNAPSHOT.jar}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.gcll.ticketagent.async

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_uuid

server:
  port: 8020

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus


knowledge:
  search:
    timeout-ms: ${KNOWLEDGE_SEARCH_TIMEOUT_MS:5000}

opsmind:
  agent:
    # 阶段2：根因分析策略。linear=原线性流水线(默认)，react=LLM 自主调工具迭代推理。
    # react 模式下 ReactRootCauseStrategy bean 激活，失败自动回退 linear（见 AnalysisWorkflowService.resolveRootCause）。
    root-cause-strategy: ${ROOT_CAUSE_STRATEGY:multi}
    # 阶段3：规划策略。default=现有 SpringAiAgentPlanner(无序动作集合)，plan-execute=有序步骤+每步目标。
    # plan-execute 模式下 PlanExecutePlanner bean 激活，失败回退 SpringAiAgentPlanner。
    # 与 react(根因)互不冲突：plan-execute 管"怎么规划调查步骤"，react 管"根因怎么推理"。
    planner-strategy: ${PLANNER_STRATEGY:default}
  llm:
    routing:
      # 兜底模型：callName 未命中任何前缀时用。沿用 qwen-plus 保证不配也能跑。
      default-model: ${LLM_DEFAULT_MODEL:qwen-plus}
      # 模型 → 上下文窗口（token）。供 truncate 按目标模型窗口动态截断 userContent。
      # 未列出的模型用 default-model-window 兜底（保守按小窗口算更安全）。
      model-windows:
        qwen-turbo: 8192      # qwen-turbo 窗口 8k
        qwen-plus: 32768      # qwen-plus 窗口 32k
        qwen-max: 32768       # qwen-max 窗口 32k
      default-model-window: ${DEFAULT_MODEL_WINDOW:8192}
      # 多模型路由：简单环节用 qwen-turbo（快+省 token），复杂环节用 qwen-plus（保效果）。
      # 前缀匹配（以 .* 结尾）+ 精确匹配，由 ModelRouter.resolveModel 解析。
      mappings:
        llm.ticket-extract: ${MODEL_EXTRACT:qwen-turbo}      # 抽取：结构化任务，简单
        llm.info-gap:       ${MODEL_GAP:qwen-turbo}          # 缺口：结构化任务，简单
        llm.tool-select:    ${MODEL_TOOL_SELECT:qwen-turbo}  # 工具选择：从白名单选，简单
        llm.follow-up:      ${MODEL_FOLLOWUP:qwen-turbo}     # 追问：生成问题，简单
        llm.agent-plan:     ${MODEL_PLAN:qwen-plus}          # 规划：需要推理，中等
        llm.root-cause:     ${MODEL_ROOT_CAUSE:qwen-plus}    # 根因：复杂推理，用强模型
        llm.routing-suggest: ${MODEL_ROUTING:qwen-plus}       # 路由建议：需要推理
        llm.suggestion:     ${MODEL_SUGGESTION:qwen-plus}    # 处置建议：需要推理
        llm.context-summarize: ${MODEL_SUMMARIZE:qwen-turbo} # 历史摘要：简单压缩，用快模型省钱      chat-memory:
        # 工单级短期记忆：按 runId 隔离各工单对话历史，多轮追问复用上下文而非重跑。
        # 关闭时退化为单轮（现状）。出问题可一键关闭回退。
        enabled: ${CHAT_MEMORY_ENABLED:true}
        # 每个工单保留最近 N 条消息（防 context 膨胀）。
        history-size: ${CHAT_MEMORY_HISTORY_SIZE:10}
        # 阶段 A：摘要式长上下文管理。开启时用 SummarizingChatMemoryAdvisor，
        # 历史 token 超阈值则 LLM 摘要旧消息（保留最近 keep-recent 条原文），而非简单裁剪。
        # 关闭 summarize 则退化为按条数裁剪（原 MessageChatMemoryAdvisor 行为）。
        summarize: ${CHAT_MEMORY_SUMMARIZE:true}
        # 目标模型上下文窗口（token）。qwen-plus 窗口 32k，默认 28000 留 12% 安全垫。
        context-window-tokens: ${CHAT_MEMORY_CONTEXT_WINDOW_TOKENS:28000}
        # 触发摘要的阈值比例。默认 0.65，留 35% 余量吸收 jtokkit 对 qwen 的 10-20% 误差。
        summarize-threshold-ratio: ${CHAT_MEMORY_SUMMARIZE_THRESHOLD:0.65}
        # 摘要时保留最近多少条原文（不摘要），兼顾近期精度与历史连续性。
        keep-recent-messages: ${CHAT_MEMORY_KEEP_RECENT:6}
  async:
    enabled: ${OPSMIND_ASYNC_ENABLED:false}
    topic: ${OPSMIND_RUN_TOPIC:opsmind.agent-run.execute}
    stuck-scan-interval-ms: ${OPSMIND_STUCK_SCAN_INTERVAL_MS:300000}
    stuck-running-timeout-minutes: ${OPSMIND_STUCK_RUNNING_TIMEOUT_MINUTES:15}
  input:
    max-content-length: ${OPSMIND_MAX_CONTENT_LENGTH:8000}
  rag:
    rerank:
      # 默认关闭：无 LLM_API_KEY 或不需要精排时走 NoopRerankService（保持向量召回顺序）
      enabled: ${RERANK_ENABLED:false}
      model: ${RERANK_MODEL:gte-rerank-v2}
      endpoint: ${RERANK_ENDPOINT:https://dashscope.aliyuncs.com/api/v1/services/rerank/text-rerank/}
    fusion:
      # 混合检索（RRF 融合向量+关键词）：默认开启，关闭时回退到纯向量检索。
      # RRF 只依赖每路排名不依赖绝对分，绕开向量(cosine)与关键词(加权分)量纲不同的问题。
      enabled: ${RAG_FUSION_ENABLED:true}
      k: ${RRF_K:60}
      topK: ${RRF_TOPK:5}
  eval:
    judge:
      # LLM-as-judge 质量评测：默认关闭，开启后 EvalRunner 对根因输出打 1-5 分。
      # 关闭时 EvalReport.qualitySummary.skipped=true，不影响现有流程断言。
      enabled: ${EVAL_JUDGE_ENABLED:false}
    adversarial:
      # 红队闭环：POST /api/evals/adversarial/generate 生成对抗工单 → 跑进 Agent →
      # LLM 裁判判定 → 把 fail 的输入沉淀进 output-path（独立于 golden 套件）。
      # POST /api/evals/run?includeAdversarial=true 才会合并对抗 case 进主回归。
      output-path: ${ADVERSARIAL_CASES_PATH:data/eval/adversarial-cases.json}
      default-count: ${ADVERSARIAL_DEFAULT_COUNT:8}
      strategies: OMIT_FIELD,CONTRADICTION,CROSS_DOMAIN,COLLOQUIAL,NON_INCIDENT,NOISE
  resilience:
    # 通配 key（* 结尾）作为前缀规则：未显式列出的 callName 按前缀自动继承策略，
    # 新增调用点零配置即纳入治理，防遗漏裸奔。精确 key 优先于前缀规则（见 CallRegistry.get）。
    call-mappings:
      llm.*:      { retry: llm-default, timelimiter: llm-default, circuitbreaker: llm-default }
      vector.*:   { retry: vector-default, timelimiter: vector-default, circuitbreaker: vector-default }
      tool.*:     { retry: tool-default, timelimiter: tool-default }
      rerank.*:   { retry: rerank-default, timelimiter: rerank-default, circuitbreaker: rerank-default }

resilience4j:
  retry:
    instances:
      llm-default:
        maxAttempts: 3
        waitDuration: 2s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        exponentialMaxWaitDuration: 8s
        retryExceptions:
          - com.gcll.ticketagent.resilience.RetryableCallException
        ignoreExceptions:
          - com.gcll.ticketagent.resilience.NonRetryableCallException
      vector-default:
        maxAttempts: 2
        waitDuration: 500ms
        retryExceptions:
          - com.gcll.ticketagent.resilience.RetryableCallException
        ignoreExceptions:
          - com.gcll.ticketagent.resilience.NonRetryableCallException
      rerank-default:
        maxAttempts: 2
        waitDuration: 500ms
        retryExceptions:
          - com.gcll.ticketagent.resilience.RetryableCallException
        ignoreExceptions:
          - com.gcll.ticketagent.resilience.NonRetryableCallException
      tool-default:
        maxAttempts: 1
  timelimiter:
    instances:
      llm-default: { timeoutDuration: 60s }
      vector-default: { timeoutDuration: 5s }
      rerank-default: { timeoutDuration: 5s }
      tool-default: { timeoutDuration: 10s }
  circuitbreaker:
    instances:
      llm-default:
        failureRateThreshold: 50
        slowCallRateThreshold: 80
        slowCallDurationThreshold: 45s
        waitDurationInOpenState: 30s
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
      vector-default:
        failureRateThreshold: 60
        waitDurationInOpenState: 15s
        slidingWindowSize: 10
      rerank-default:
        # rerank 失败可降级回原始向量排序，熔断打开时直接降级
        failureRateThreshold: 60
        waitDurationInOpenState: 15s
        slidingWindowSize: 10

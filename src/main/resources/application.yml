spring:
  application:
    name: tech-support-agent
  profiles:
    default: local
  autoconfigure:
    exclude:
      - org.springframework.ai.autoconfigure.vectorstore.pgvector.PgVectorStoreAutoConfiguration
      - org.springframework.ai.autoconfigure.vectorstore.milvus.MilvusVectorStoreAutoConfiguration
  datasource:
    url: jdbc:postgresql://${PG_HOST:localhost}:${PG_PORT:5432}/${PG_DATABASE:tech_support_agent}
    username: ${PG_USER:postgres}
    password: ${PG_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/data-knowledge.sql
  ai:
    dashscope:
      api-key: ${LLM_API_KEY:}
      # HTTP 层读响应超时（秒）——治线程泄漏之本。
      # DashScopeAutoConfiguration 的 restClientCustomizer 消费本字段设置 socket readTimeout，
      # 保证单次 LLM 调用最坏 60s 释放线程（Resilience4j TimeLimiter 的 cancel 对阻塞 IO 无效，
      # HTTP 层 timeout 是最终保证）。等于业务层 llm-default TimeLimiter 上限。
      read-timeout: ${LLM_READ_TIMEOUT_SEC:60}
      chat:
        options:
          model: ${LLM_MODEL:qwen-plus}
    mcp:
      client:
        # 默认关闭：测试/无 PG 环境下不拉起 server 子进程；生产/演示时设 MCP_ENABLED=true
        enabled: ${MCP_ENABLED:false}
        name: tech-support-mcp-client
        version: 1.0.0
        type: SYNC
        stdio:
          connections:
            ops-mcp-server:
              # stdio 子进程：应用拉起 ops-mcp-server jar，经 stdin/stdout 通信
              command: ${MCP_SERVER_JAVA:java}
              args:
                - "-jar"
                - ${MCP_SERVER_JAR:../ops-mcp-server/target/ops-mcp-server-1.0.0-SNAPSHOT.jar}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.gcll.ticketagent.async

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_uuid

server:
  port: 8020

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

llm:
  connect-timeout-ms: 10000
  read-timeout-ms: 60000
  max-retries: 2

knowledge:
  search:
    timeout-ms: ${KNOWLEDGE_SEARCH_TIMEOUT_MS:5000}

opsmind:
  async:
    enabled: ${OPSMIND_ASYNC_ENABLED:false}
    topic: ${OPSMIND_RUN_TOPIC:opsmind.agent-run.execute}
    stuck-scan-interval-ms: ${OPSMIND_STUCK_SCAN_INTERVAL_MS:300000}
    stuck-running-timeout-minutes: ${OPSMIND_STUCK_RUNNING_TIMEOUT_MINUTES:15}
  input:
    max-content-length: ${OPSMIND_MAX_CONTENT_LENGTH:8000}
  resilience:
    # 通配 key（* 结尾）作为前缀规则：未显式列出的 callName 按前缀自动继承策略，
    # 新增调用点零配置即纳入治理，防遗漏裸奔。精确 key 优先于前缀规则（见 CallRegistry.get）。
    call-mappings:
      llm.*:      { retry: llm-default, timelimiter: llm-default, circuitbreaker: llm-default }
      vector.*:   { retry: vector-default, timelimiter: vector-default, circuitbreaker: vector-default }
      tool.*:     { retry: tool-default, timelimiter: tool-default }

resilience4j:
  retry:
    instances:
      llm-default:
        maxAttempts: 3
        waitDuration: 2s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        exponentialMaxWaitDuration: 8s
        retryExceptions:
          - com.gcll.ticketagent.resilience.RetryableCallException
        ignoreExceptions:
          - com.gcll.ticketagent.resilience.NonRetryableCallException
      vector-default:
        maxAttempts: 2
        waitDuration: 500ms
        retryExceptions:
          - com.gcll.ticketagent.resilience.RetryableCallException
        ignoreExceptions:
          - com.gcll.ticketagent.resilience.NonRetryableCallException
      tool-default:
        maxAttempts: 1
  timelimiter:
    instances:
      llm-default: { timeoutDuration: 60s }
      vector-default: { timeoutDuration: 5s }
      tool-default: { timeoutDuration: 10s }
  circuitbreaker:
    instances:
      llm-default:
        failureRateThreshold: 50
        slowCallRateThreshold: 80
        slowCallDurationThreshold: 45s
        waitDurationInOpenState: 30s
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
      vector-default:
        failureRateThreshold: 60
        waitDurationInOpenState: 15s
        slidingWindowSize: 10

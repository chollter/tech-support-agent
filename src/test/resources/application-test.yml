spring:
  application:
    name: tech-support-agent-test
  datasource:
    url: jdbc:h2:mem:tech_support_agent_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/data-knowledge.sql
  ai:
    dashscope:
      api-key: test-key
    chat:
      memory:
        repository:
          jdbc:
            # 测试用 H2，但 Spring AI ChatMemory 的 JDBC starter 没带 schema-h2.sql，
            # 关掉自动建表避免启动失败。测试不依赖 ChatMemory 持久化（单测走 mock）。
            initialize-schema: never

opsmind:
  redisson:
    enabled: false
